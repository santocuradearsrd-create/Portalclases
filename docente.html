<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portal Docente · CESCAR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --azul:#1B3A6B;--azul-cl:#DCE8F5;--verde:#1B5E20;--verde-cl:#E8F5E9;
  --morado:#4A148C;--dorado:#7B5800;--gris:#37474F;--rojo:#B71C1C;
  --bg:#F0F4F8;--card:#fff;--txt:#1A1A1A;--sub:#555;--border:#E0E0E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:15px;background:var(--bg);color:var(--txt);min-height:100vh}
nav{background:var(--azul);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.logo{font-size:16px;font-weight:700;flex:1}
.logo span{font-size:11px;opacity:.7;display:block;font-weight:400}
.prof-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.btn-ghost{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none;display:inline-block}
.btn-ghost:hover{background:rgba(255,255,255,.28)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
.main-panel{padding:20px;overflow-y:auto}
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px);background:var(--bg)}
.pin-card{background:#fff;border-radius:16px;padding:40px 36px;width:380px;box-shadow:0 4px 24px rgba(0,0,0,.12);text-align:center}
.pin-card .icon{font-size:44px;margin-bottom:12px}
.pin-card h2{font-size:20px;font-weight:700;margin-bottom:6px;color:var(--azul)}
.pin-card p{font-size:13px;color:var(--sub);margin-bottom:24px;line-height:1.5}
.pin-input{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.pin-digit{width:42px;height:52px;border:2px solid var(--border);border-radius:10px;font-size:22px;text-align:center;font-weight:700;outline:none;transition:.2s}
.pin-digit:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(27,58,107,.15)}
.pin-error{color:var(--rojo);font-size:13px;min-height:20px;margin-bottom:8px}
.btn-primary{background:var(--azul);color:#fff;border:none;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;width:100%;transition:.2s}
.btn-primary:hover{background:#122d55}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.sidebar-title{font-size:10px;font-weight:700;color:#AAB4C4;letter-spacing:1.5px;margin-bottom:8px;margin-top:16px}
.sidebar-title:first-child{margin-top:0}
.materia-pill{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;border:1.5px solid transparent;transition:.15s}
.materia-pill:hover{background:var(--azul-cl)}
.materia-pill.active{background:var(--azul-cl);border-color:#9BBFED}
.materia-pill .mp-name{font-size:13px;font-weight:700;color:var(--azul)}
.materia-pill .mp-sub{font-size:11px;color:var(--sub);margin-top:2px}
.sidebar-btn{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--txt);text-align:left;margin-bottom:6px;transition:.15s}
.sidebar-btn:hover{background:var(--azul-cl);border-color:#9BBFED;color:var(--azul)}
.sidebar-btn.active{background:var(--azul-cl);border-color:#9BBFED;color:var(--azul)}
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.week-tile{background:#fff;border-radius:12px;padding:14px 16px;border:1.5px solid var(--border);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.week-tile:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(-2px);border-color:#9BBFED}
.week-tile.has-content{border:none;background:linear-gradient(145deg,var(--tc,#1B3A6B) 0%,var(--tc,#1B3A6B) 4px,#fff 4px)}
.week-tile.has-content::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--tc,#1B3A6B)}
.week-tile.has-content{border:1.5px solid color-mix(in srgb, var(--tc,#1B3A6B) 20%, #fff);padding-left:18px}
.week-tile.is-active{background:linear-gradient(145deg,#fff 0%,#F0FFF8 100%);border-color:#66BB6A;box-shadow:0 2px 12px rgba(76,175,80,.15)}
.week-tile.is-active::after{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 20px 20px 0;border-color:transparent #4CAF50 transparent transparent}
.wt-num{font-size:10px;font-weight:700;color:#AAA;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.wt-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wt-badges{display:flex;gap:4px;flex-wrap:wrap}
.wt-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.wt-on{background:linear-gradient(135deg,#43A047,#2E7D32);color:#fff;box-shadow:0 1px 4px rgba(46,125,50,.3)}
.wt-off{background:#ECEFF1;color:#78909C}
.wt-empty{background:#F5F5F5;color:#BDBDBD;font-style:italic}
.editor-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.editor-back{padding:7px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--txt)}
.editor-back:hover{background:var(--azul-cl)}
.editor-tabs{display:flex;gap:2px;background:#F0F4F8;padding:4px;border-radius:10px;margin-bottom:18px;width:fit-content}
.editor-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;border:none;background:none;color:var(--sub)}
.editor-tab.active{background:#fff;color:var(--azul);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:#7A8FA8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;color:var(--txt);background:#fff;transition:.15s;font-family:inherit}
.form-input:focus{border-color:var(--azul);box-shadow:0 0 0 3px rgba(27,58,107,.1)}
.form-select{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;color:var(--txt);background:#fff;cursor:pointer}
.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;resize:vertical;min-height:70px;font-family:inherit;line-height:1.6;color:var(--txt);background:#fff;transition:.15s}
.form-textarea:focus{border-color:var(--azul)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.section-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
.section-card-title{font-size:11px;font-weight:700;letter-spacing:.8px;margin-bottom:14px;text-transform:uppercase}
.moment-block{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.moment-header{padding:8px 14px;display:flex;align-items:center;gap:10px}
.moment-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;background:#FAFBFD}
.step-row{display:flex;gap:6px;align-items:flex-start}
.step-num{font-size:11px;color:#AAA;padding-top:10px;min-width:18px;flex-shrink:0}
.btn-add-step{padding:5px 12px;border-radius:6px;border:1px dashed #CCC;background:#fff;font-size:11px;cursor:pointer;font-weight:600;color:#888;transition:.15s;margin-top:4px}
.btn-add-step:hover{border-color:var(--azul);color:var(--azul)}
.btn-remove{padding:4px 8px;border-radius:6px;border:none;background:none;font-size:14px;cursor:pointer;color:#DDD;flex-shrink:0;margin-top:6px;line-height:1}
.btn-remove:hover{color:var(--rojo)}
.save-bar{position:sticky;bottom:0;background:#fff;border-top:2px solid var(--border);padding:12px 20px;display:flex;gap:10px;align-items:center;z-index:10;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.btn-save{padding:10px 28px;background:var(--azul);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-save:hover{background:#122d55}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-publish{padding:10px 20px;background:#E8F5E9;color:var(--verde);border:1.5px solid #81C784;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.btn-unpublish{padding:10px 20px;background:#FFF3E0;color:#E65100;border:1.5px solid #FFCC80;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.json-box{background:#1E1E1E;color:#9CDCFE;border-radius:10px;padding:16px;font-family:'Courier New',monospace;font-size:12px;line-height:1.65;min-height:280px;resize:vertical;width:100%;border:none;outline:none}
.prompt-box{background:#F7F9FC;border:1.5px solid #C8D8EE;border-radius:10px;padding:16px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7;white-space:pre-wrap;color:#333;max-height:420px;overflow-y:auto}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.color-swatch.sel{border-color:#333;transform:scale(1.15)}
.admin-card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:20px;margin-bottom:14px}
.admin-card h3{font-size:15px;font-weight:700;color:var(--azul);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.prof-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--bg)}
.prof-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--azul);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.page-spinner{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--sub)}
#toast{position:fixed;bottom:20px;right:20px;background:var(--gris);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s;max-width:340px;line-height:1.4}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{background:var(--verde)}
#toast.error{background:var(--rojo)}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{display:none}.form-row,.form-row3{grid-template-columns:1fr}}

/* ── RÚBRICA ── */
.rubrica-wrap{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.rubrica-head{display:grid;grid-template-columns:140px 1fr 1fr 1fr 1fr 30px;gap:6px;padding:8px 12px;background:var(--gris)}
.rubrica-head span{font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px}
.rubrica-criteria-row{display:grid;grid-template-columns:140px 1fr 1fr 1fr 1fr 30px;gap:6px;padding:10px 12px;border-bottom:1px solid var(--border);align-items:start}
.rubrica-criteria-row:last-child{border-bottom:none}
.rubrica-criteria-row:nth-child(even){background:#FAFBFD}
.rb-ta{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:5px 7px;font-size:11px;resize:none;outline:none;font-family:inherit;line-height:1.5;min-height:50px;transition:.15s}
.rb-ta:focus{border-color:var(--azul)}
.rb-ex{background:#F0FDF4}.rb-lo{background:#EFF3FF}.rb-pr{background:#FFF8F0}.rb-in{background:#FFF0F0}
.rubrica-empty{padding:20px;text-align:center;color:#AAA;font-size:13px;background:#FAFBFD}
.btn-rubrica-add{width:100%;padding:9px;border:1.5px dashed #9BBFED;background:#F0F6FF;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;color:var(--azul);transition:.15s;margin-top:6px}
.btn-rubrica-add:hover{background:var(--azul-cl);border-color:var(--azul)}
.btn-rubrica-clear{width:100%;padding:8px;border:1.5px dashed #FFCDD2;background:#FFF5F5;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;color:var(--rojo);transition:.15s;margin-top:4px}
.btn-rubrica-clear:hover{background:#FFEBEE}

/* ── ICONOS DE MATERIA ── */
.icono-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.icono-btn{width:44px;height:44px;border:2px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;padding:0}
.icono-btn:hover{border-color:var(--azul);background:var(--azul-cl)}
.icono-btn.sel{border-color:var(--azul);background:var(--azul-cl);box-shadow:0 0 0 2px var(--azul)}
.icono-btn svg{width:24px;height:24px}

/* ── IMÁGENES ── */
.img-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.img-thumb{position:relative;width:96px;height:72px;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);background:#F0F4F8}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-del{position:absolute;top:3px;right:3px;background:rgba(183,28,28,.85);border:none;color:#fff;width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;line-height:1}
.img-upload-btn{width:96px;height:72px;border:2px dashed #9BBFED;border-radius:8px;background:#F0F6FF;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;color:var(--azul);font-weight:600;transition:.15s}
.img-upload-btn:hover{background:var(--azul-cl);border-color:var(--azul)}
.img-upload-btn svg{width:22px;height:22px;stroke:var(--azul);fill:none}
.img-hint{font-size:10px;color:#AAA;margin-top:6px;line-height:1.4}

/* ── ADMIN MEJORADO ── */
.admin-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.admin-card h3{font-size:15px;font-weight:700;color:var(--azul);margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--azul-cl);display:flex;align-items:center;gap:8px}
.prof-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--bg);transition:.15s}
.prof-row:hover{border-color:#9BBFED;background:var(--azul-cl)}
.prof-avatar{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prof-avatar svg{width:26px;height:26px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<nav>
  <div class="logo">⚙️ Portal Docente · CESCAR<span>Panel de gestión de clases</span></div>
  <div id="nav-prof" style="display:none" class="prof-badge">
    <span id="nav-prof-icon">📚</span>

  </div>

  <a href="index.html" class="btn-ghost">🌐 Ver portal</a>
</nav>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-card">
    <div class="icon">🔐</div>
    <h2>Acceso Docente</h2>
    <p>Ingresa tu PIN de 6 dígitos</p>
    <div class="pin-input">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d0" oninput="pinNext(this,1)" onkeydown="pinBack(this,event,-1)">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d1" oninput="pinNext(this,2)" onkeydown="pinBack(this,event,0)">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d2" oninput="pinNext(this,3)" onkeydown="pinBack(this,event,1)">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d3" oninput="pinNext(this,4)" onkeydown="pinBack(this,event,2)">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d4" oninput="pinNext(this,5)" onkeydown="pinBack(this,event,3)">
      <input class="pin-digit" type="password" maxlength="1" inputmode="numeric" id="d5" oninput="pinNext(this,-1)" onkeydown="pinBack(this,event,4)">
    </div>
    <div class="pin-error" id="pin-error"></div>
    <button class="btn-primary" id="pin-btn" onclick="doLogin()" disabled>Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="layout" id="app-layout" style="display:none">
  <div class="sidebar">
    <div class="sidebar-title">MIS MATERIAS</div>
    <div id="sb-materias"><div class="spinner"></div></div>
    <div class="sidebar-title">GRADO</div>
    <div id="sb-grados"></div>
    <div class="sidebar-title">PERÍODO</div>
    <div id="sb-periodos"></div>
    <div id="sb-admin" style="display:none;margin-top:20px">
      <div class="sidebar-title">ADMINISTRACIÓN</div>
      <button class="sidebar-btn" onclick="showAdmin()">👥 Gestionar docentes</button>
    </div>
  </div>
  <div class="main-panel" id="main-panel">
    <div class="page-spinner"><div class="spinner"></div>Cargando...</div>
  </div>
</div>
<div id="toast"></div>

<script>
const SB_URL  = 'https://famdtakcyifspscmphiy.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhbWR0YWtjeWlmc3BzY21waGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTMzNDMsImV4cCI6MjA5MDg4OTM0M30.4bQVm39uwPP9W5BZrfyvmeaCdSy-Dx0yqDn2Ws8w0Fo';
const sb = supabase.createClient(SB_URL, SB_ANON);

const GRADOS   = ['1ro','2do','3ro','4to','5to','6to'];
const PERIODOS = [1,2,3,4];
const FASES    = ['','SENTIR','PENSAR','ACTUAR','CELEBRAR'];
const COLORES  = ['#1B3A6B','#1B5E20','#4A148C','#C84B00','#006064','#B71C1C','#37474F','#FF8F00','#0277BD','#558B2F'];

let S = { prof:null, pinHash:null, isAdmin:false }; // session
let A = { materiaId:null, grado:'1ro', periodo:1, materias:[], clases:[] }; // app state
let E = { semana:null, claseId:null, tab:'manual', activa:false, form:null }; // editor state

// ── PIN ──────────────────────────────────────────────────────────
function pinNext(el,next){
  el.value=el.value.replace(/\D/g,'');
  const all=['d0','d1','d2','d3','d4','d5'].every(id=>document.getElementById(id).value.length===1);
  document.getElementById('pin-btn').disabled=!all;
  if(el.value&&next>=0) document.getElementById('d'+next).focus();
}
function pinBack(el,e,prev){if(e.key==='Backspace'&&!el.value&&prev>=0)document.getElementById('d'+prev).focus();}

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const pin=['d0','d1','d2','d3','d4','d5'].map(id=>document.getElementById(id).value).join('');
  if(pin.length<6)return;
  document.getElementById('pin-btn').disabled=true;
  document.getElementById('pin-btn').textContent='Verificando...';
  document.getElementById('pin-error').textContent='';

  const hash=await sha256(pin);

  // Probar admin primero
  const {data:adm}=await sb.rpc('auth_admin',{p_pin_hash:hash});
  if(adm?.ok){
    S={prof:{id:null,nombre:'Administrador',icono:'⚙️',color_1:'#1B3A6B'},pinHash:hash,isAdmin:true};
    saveSession(); startApp(); return;
  }

  // Probar profesor
  const {data:prof}=await sb.rpc('auth_profesor',{p_pin_hash:hash});
  if(prof?.ok){
    S={prof,pinHash:hash,isAdmin:false};
    saveSession(); startApp(); return;
  }

  document.getElementById('pin-error').textContent='PIN incorrecto.';
  document.getElementById('pin-btn').disabled=false;
  document.getElementById('pin-btn').textContent='Entrar';
  ['d0','d1','d2','d3','d4','d5'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('d0').focus();
}

function saveSession(){sessionStorage.setItem('ds',JSON.stringify(S));}
function logout(){
  sessionStorage.removeItem('ds'); S={prof:null,pinHash:null,isAdmin:false};
  document.getElementById('pin-screen').style.display='flex';
  document.getElementById('app-layout').style.display='none';
  document.getElementById('nav-prof').style.display='none';
  document.getElementById('btn-logout').style.display='none';
  ['d0','d1','d2','d3','d4','d5'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pin-btn').disabled=true;
  document.getElementById('pin-btn').textContent='Entrar';
  document.getElementById('pin-error').textContent='';
}

// Restaurar sesión
try{const sv=sessionStorage.getItem('ds');if(sv){S=JSON.parse(sv);startApp();}}catch(e){sessionStorage.removeItem('ds');}

// ── APP INIT ─────────────────────────────────────────────────────
function startApp(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app-layout').style.display='grid';
  document.getElementById('btn-logout').style.display='block';
  document.getElementById('nav-prof').style.display='flex';
  document.getElementById('nav-prof-icon').textContent=S.prof?.icono||'📚';
  document.getElementById('nav-prof-name').textContent=S.prof?.nombre||'Docente';
  if(S.isAdmin) document.getElementById('sb-admin').style.display='block';
  renderSbGrados(); renderSbPeriodos();
  if(S.isAdmin){ showAdmin(); }
  else{ loadProfesorData(); }
}

function renderSbGrados(){
  document.getElementById('sb-grados').innerHTML=GRADOS.map(g=>
    `<button class="sidebar-btn${A.grado===g?' active':''}" onclick="setGrado('${g}')">${g}</button>`
  ).join('');
}
function renderSbPeriodos(){
  document.getElementById('sb-periodos').innerHTML=PERIODOS.map(p=>
    `<button class="sidebar-btn${A.periodo===p?' active':''}" onclick="setPeriodo(${p})">Período ${p}</button>`
  ).join('');
}
function setGrado(g){A.grado=g;renderSbGrados();showGrid();}
function setPeriodo(p){A.periodo=p;renderSbPeriodos();showGrid();}

async function loadProfesorData(){
  document.getElementById('sb-materias').innerHTML='<div class="spinner"></div>';
  document.getElementById('main-panel').innerHTML='<div class="page-spinner"><div class="spinner"></div>Cargando materias...</div>';

  // ── FIX: usar RPC en vez de query directa (RLS bloqueaba la tabla)
  const {data:mData}=await sb.rpc('get_materias_profesor',{p_profesor_id:S.prof.id,p_pin_hash:S.pinHash});
  if(!mData?.ok){showToast('Error cargando materias: '+(mData?.error||'desconocido'),'error');return;}
  A.materias=mData.data||[];

  // Cargar clases
  const {data:cData}=await sb.rpc('get_clases_profesor',{p_profesor_id:S.prof.id,p_pin_hash:S.pinHash});
  A.clases=cData?.ok?(cData.data||[]):[];

  if(A.materias.length>0&&!A.materiaId) A.materiaId=A.materias[0].id;
  renderSbMaterias();
  showGrid();
}

function renderSbMaterias(){
  const el=document.getElementById('sb-materias');
  if(!A.materias.length){
    el.innerHTML='<div style="font-size:12px;color:var(--sub);padding:8px;font-style:italic">Sin materias asignadas.<br>Contacta al administrador.</div>';
    return;
  }
  el.innerHTML=A.materias.map(m=>`
    <div class="materia-pill${m.id===A.materiaId?' active':''}" onclick="setMateria('${m.id}')">
      <div style="display:flex;align-items:center;gap:7px">
        <span style="width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:${m.color||'#1B3A6B'}">${getIconoSVG(m.icono)}</span>
        <span class="mp-name">${esc(m.nombre)}</span>
      </div>
      <div class="mp-sub">${m.icono||'📚'}</div>
    </div>`).join('');
}
function setMateria(id){A.materiaId=id;renderSbMaterias();showGrid();}

// ── GRID DE SEMANAS ───────────────────────────────────────────────
function showGrid(){
  const panel=document.getElementById('main-panel');
  if(!A.materiaId){panel.innerHTML='<div class="page-spinner" style="color:var(--sub);flex-direction:column;gap:8px"><div style="font-size:32px">📚</div><div>Selecciona una materia</div></div>';return;}
  const mat=A.materias.find(m=>m.id===A.materiaId);
  const color=mat?.color||'#1B3A6B';

  const claseMap={};
  A.clases.filter(c=>c.materia_id===A.materiaId&&c.grado===A.grado&&c.periodo===A.periodo)
    .forEach(c=>claseMap[c.semana]=c);

  let html=`<div style="margin-bottom:20px">
    <div style="font-size:20px;font-weight:700;color:var(--azul);margin-bottom:4px">${esc(mat?.nombre||'')}</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:16px">${A.grado} · Período ${A.periodo} — Haz clic en una semana para editar</div>
    <div class="week-grid">`;

  for(let s=1;s<=12;s++){
    const c=claseMap[s];
    if(c){
      html+=`<div class="week-tile has-content${c.activa?' is-active':''}" style="--tc:${color}" onclick="openEditor(${s})">
        <div class="wt-num">Semana ${s}</div>
        <div class="wt-title">${esc(c.titulo||'Sin título')}</div>
        <div class="wt-badges">
          <span class="wt-badge ${c.activa?'wt-on':'wt-off'}">${c.activa?'✅ Publicada':'⬜ Borrador'}</span>
          ${c.fase?`<span class="wt-badge" style="background:#F0F4F8;color:#555">${esc(c.fase)}</span>`:''}
        </div>
      </div>`;
    } else {
      html+=`<div class="week-tile" onclick="openEditor(${s})">
        <div class="wt-num">Semana ${s}</div>
        <div class="wt-title wt-empty">Sin contenido</div>
        <div class="wt-badges"><span class="wt-badge wt-empty">+ Crear</span></div>
      </div>`;
    }
  }
  html+=`</div></div>`;
  panel.innerHTML=html;
}

// ── EDITOR ────────────────────────────────────────────────────────
async function openEditor(semana){
  const mat=A.materias.find(m=>m.id===A.materiaId);
  const color=mat?.color||'#1B3A6B';
  const existing=A.clases.find(c=>c.materia_id===A.materiaId&&c.grado===A.grado&&c.periodo===A.periodo&&c.semana===semana);

  document.getElementById('main-panel').innerHTML='<div class="page-spinner"><div class="spinner"></div>Cargando clase...</div>';

  let claseData=null;
  if(existing){
    const {data}=await sb.rpc('get_clase_detalle',{p_profesor_id:S.prof.id,p_pin_hash:S.pinHash,p_clase_id:existing.id});
    if(data?.ok) claseData=data.data;
  }

  E={semana,claseId:claseData?.id||null,tab:'manual',activa:claseData?.activa||false,form:claseData?normalizeForm(claseData):emptyForm()};
  renderEditor(mat);
}

function emptyForm(){
  return {titulo:'',subtitulo:'',fase:'',competencia:'',indicadores:[],peso:'',instrumento:'',color:'#1B3A6B',
    actividades:[{tipo:'I',titulo:'Inicio (~10 min)',pasos:['']},{tipo:'D',titulo:'Desarrollo (~25 min)',pasos:['']},{tipo:'C',titulo:'Cierre (~15 min)',pasos:['']}],
    texto_biblico:{cita:'',texto:'',contexto:''},actividades_cuaderno:[{instruccion:''}],
    metacognicion:'',recursos:[],nota_sustituto:'',classroom_txt:'',imagenes:[],rubrica:null};
}

function normalizeForm(d){
  return {
    titulo:d.titulo||'', subtitulo:d.subtitulo||'', fase:d.fase||'',
    competencia:d.competencia||'', indicadores:parseJ(d.indicadores,[]),
    peso:d.peso||'', instrumento:d.instrumento||'', color:d.color||'#1B3A6B',
    actividades:parseJ(d.actividades,[{tipo:'I',titulo:'Inicio',pasos:['']},{tipo:'D',titulo:'Desarrollo',pasos:['']},{tipo:'C',titulo:'Cierre',pasos:['']}]),
    texto_biblico:parseJ(d.texto_biblico,{cita:'',texto:'',contexto:''}),
    actividades_cuaderno:parseJ(d.actividades_cuaderno,[{instruccion:''}]),
    metacognicion:d.metacognicion||'', recursos:parseJ(d.recursos,[]),
    nota_sustituto:d.nota_sustituto||'', classroom_txt:d.classroom_txt||'',
    imagenes:parseJ(d.imagenes,[]), rubrica:parseJ(d.rubrica,null),
  };
}

function renderEditor(mat){
  const color=mat?.color||'#1B3A6B';
  const panel=document.getElementById('main-panel');
  panel.innerHTML=`
    <div class="editor-header">
      <button class="editor-back" onclick="backToGrid()">← Volver</button>
      <div>
        <div style="font-size:11px;color:#AAA;font-weight:700;letter-spacing:.8px">${esc(mat?.nombre||'')} · ${A.grado} · Período ${A.periodo}</div>
        <div style="font-size:17px;font-weight:700;color:var(--azul)">Semana ${E.semana}</div>
      </div>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:${E.activa?'var(--verde)':'#BBB'};font-weight:700">${E.activa?'✅ Publicada al estudiante':'⬜ No publicada'}</span>
    </div>
    <div class="editor-tabs">
      <button class="editor-tab${E.tab==='manual'?' active':''}" onclick="switchTab('manual')">✏️ Manual</button>
      <button class="editor-tab${E.tab==='json'?' active':''}" onclick="switchTab('json')">📥 JSON</button>
      <button class="editor-tab${E.tab==='prompt'?' active':''}" onclick="switchTab('prompt')">✨ Prompt IA</button>
    </div>
    <div id="editor-body"></div>
    <div class="save-bar">
      <button class="btn-save" id="btn-save" onclick="saveClase()">💾 Guardar</button>
      <button id="btn-toggle" class="${E.activa?'btn-unpublish':'btn-publish'}" onclick="toggleActiva()">
        ${E.activa?'⬜ Despublicar':'✅ Publicar al estudiante'}
      </button>
      <span id="save-msg" style="font-size:12px;color:#AAA;margin-left:8px"></span>
      ${!E.activa?'<span style="margin-left:auto;font-size:11px;color:#E65100;background:#FFF3E0;border:1px solid #FFCC80;padding:4px 10px;border-radius:6px;font-weight:600">⚠️ Guarda y luego Publica para que los estudiantes vean el contenido</span>':''}
    </div>`;
  renderEditorBody();
}

function switchTab(tab){E.tab=tab;const m=A.materias.find(m=>m.id===A.materiaId);renderEditor(m);}

function renderEditorBody(){
  const el=document.getElementById('editor-body');
  if(!el)return;
  if(E.tab==='manual') el.innerHTML=renderManual();
  else if(E.tab==='json') el.innerHTML=renderJSONTab();
  else el.innerHTML=renderPromptTab();
}

function renderManual(){
  const f=E.form;
  const bib=f.texto_biblico||{};
  const actvs=Array.isArray(f.actividades)?f.actividades:[];
  const cuad=Array.isArray(f.actividades_cuaderno)?f.actividades_cuaderno:[];
  const indsStr=Array.isArray(f.indicadores)?f.indicadores.join(', '):'';
  const recStr=Array.isArray(f.recursos)?f.recursos.join(', '):'';

  const swatches=COLORES.map(c=>`<div class="color-swatch${f.color===c?' sel':''}" style="background:${c}" onclick="setColor('${c}')"></div>`).join('');

  const mHtml=actvs.map((a,ai)=>{
    const bg=a.tipo==='I'?'#EEF2FF':a.tipo==='D'?'#E8F5E9':'#FFF3E0';
    const bc=a.tipo==='I'?'#3949AB':a.tipo==='D'?'#2E7D32':'#E65100';
    return `<div class="moment-block">
      <div class="moment-header" style="background:${bg}">
        <div style="width:28px;height:28px;border-radius:50%;background:${bc};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${esc(a.tipo)}</div>
        <input value="${esc(a.titulo)}" oninput="setMTitulo(${ai},this.value)" style="flex:1;border:none;background:transparent;font-size:13px;font-weight:700;outline:none;color:${bc}">
      </div>
      <div class="moment-body">
        ${(a.pasos||[]).map((p,pi)=>`<div class="step-row">
          <span class="step-num">${pi+1}.</span>
          <textarea class="form-textarea" rows="2" style="min-height:50px" oninput="setPaso(${ai},${pi},this.value)">${esc(p)}</textarea>
          <button class="btn-remove" onclick="rmPaso(${ai},${pi})" title="Eliminar paso">✕</button>
        </div>`).join('')}
        <button class="btn-add-step" onclick="addPaso(${ai})">+ Paso</button>
      </div>
    </div>`;
  }).join('');

  return `<div style="max-width:720px;padding-bottom:80px">
    <div class="section-card">
      <div class="section-card-title" style="color:var(--azul)">📋 Información básica</div>
      <div class="form-row"><div class="form-group"><label class="form-label">Título *</label><input class="form-input" value="${esc(f.titulo)}" oninput="setF('titulo',this.value)" placeholder="Ej: La familia cristiana"></div>
      <div class="form-group"><label class="form-label">Subtítulo</label><input class="form-input" value="${esc(f.subtitulo||'')}" oninput="setF('subtitulo',this.value)" placeholder="Subtítulo o textos del tema"></div></div>
      <div class="form-row3">
        <div class="form-group"><label class="form-label">Fase pedagógica</label>
          <select class="form-select" onchange="setF('fase',this.value)">
            ${FASES.map(fa=>`<option value="${fa}"${f.fase===fa?' selected':''}>${fa||'— Sin fase —'}</option>`).join('')}
          </select></div>
        <div class="form-group"><label class="form-label">Peso</label><input class="form-input" value="${esc(f.peso||'')}" oninput="setF('peso',this.value)" placeholder="ej: 10%"></div>
        <div class="form-group"><label class="form-label">Instrumento</label><input class="form-input" value="${esc(f.instrumento||'')}" oninput="setF('instrumento',this.value)" placeholder="Rúbrica, lista..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Competencia</label><input class="form-input" value="${esc(f.competencia||'')}" oninput="setF('competencia',this.value)"></div>
        <div class="form-group"><label class="form-label">Indicadores (coma)</label><input class="form-input" value="${esc(indsStr)}" oninput="setF('indicadores',this.value.split(',').map(s=>s.trim()).filter(Boolean))" placeholder="#1, #2"></div>
      </div>
      <div class="form-group"><label class="form-label">Color de la clase</label><div class="color-swatches">${swatches}</div></div>
    </div>

    <div class="section-card">
      <div class="section-card-title" style="color:#4A148C">📖 Texto bíblico (opcional)</div>
      <div class="form-group"><label class="form-label">Cita</label><input class="form-input" value="${esc(bib.cita||'')}" oninput="setBib('cita',this.value)" placeholder="Juan 13:14-15"></div>
      <div class="form-group"><label class="form-label">Texto</label><textarea class="form-textarea" rows="3" oninput="setBib('texto',this.value)">${esc(bib.texto||'')}</textarea></div>
      <div class="form-group"><label class="form-label">Contexto / reflexión</label><textarea class="form-textarea" rows="2" oninput="setBib('contexto',this.value)">${esc(bib.contexto||'')}</textarea></div>
    </div>

    <div class="section-card">
      <div class="section-card-title" style="color:var(--azul)">⏱ Secuencia de clase (I / D / C)</div>
      ${mHtml}
    </div>

    <div class="section-card">
      <div class="section-card-title" style="color:var(--azul)">📓 Actividades del cuaderno</div>
      ${cuad.map((c,i)=>`<div class="step-row" style="margin-bottom:8px">
        <span class="step-num">${i+1}.</span>
        <textarea class="form-textarea" rows="2" oninput="setCuad(${i},this.value)">${esc(c.instruccion||'')}</textarea>

    <div class="section-card">
      <div class="section-card-title" style="color:var(--dorado)">💭 Reflexión / Metacognición</div>

    </div>

    <div class="section-card">
      <div class="section-card-title" style="color:var(--verde)">📋 Tarea Google Classroom</div>
      <textarea class="form-textarea" rows="4" oninput="setF('classroom_txt',this.value)">${esc(f.classroom_txt||'')}</textarea>
    </div>

    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-card-title" style="color:var(--gris);margin-bottom:0">📊 Rúbrica de evaluación</div>
        <span style="font-size:10px;background:#F0F4F8;color:#888;padding:3px 8px;border-radius:10px;font-weight:600">Opcional</span>
      </div>
      <div style="font-size:11px;color:#AAA;margin-bottom:10px;line-height:1.5">
        Visible para estudiantes, supervisores y sustitutos. Define los criterios con los que se evaluará el trabajo.
      </div>
      ${renderRubricaBlock()}
    </div>

    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="section-card-title" style="color:var(--azul);margin-bottom:0">🖼️ Recursos visuales</div>
        <span style="font-size:10px;background:#F0F6FF;color:var(--azul);padding:3px 8px;border-radius:10px;font-weight:600">máx 5 · 800KB c/u</span>
      </div>
      <div style="font-size:11px;color:#AAA;margin-bottom:10px;line-height:1.5">
        Imágenes de planos, diagramas o ejercicios. Los estudiantes las verán en carousel. Solo JPG, PNG o WebP.
      </div>
      <div id="img-section">${renderImageBlock()}</div>
    </div>

    <div class="section-card">
      <div class="section-card-title" style="color:var(--gris)">📝 Nota para sustituto/a</div>
      <textarea class="form-textarea" rows="3" oninput="setF('nota_sustituto',this.value)">${esc(f.nota_sustituto||'')}</textarea>
    </div>
  </div>`;
}

function buildPrompt(mat){
  return `Eres un asistente pedagógico. Genera un Plan de Clase en JSON para:

Materia: ${mat?.nombre||'Sin especificar'}
Grado: ${A.grado}
Período: ${A.periodo}

REGLAS:
- Devuelve ÚNICAMENTE el JSON válido. Sin texto previo, sin bloques markdown.
- Adapta todo al material que te doy abajo.
- actividades: 3 momentos con tipo "I", "D", "C".
- Si la materia NO es religiosa, deja texto_biblico con campos en "".
- classroom_txt: texto para pegar en Google Classroom. Si no hay tarea, "".

ESTRUCTURA JSON:
{
  "titulo": "",
  "subtitulo": "",
  "fase": "SENTIR | PENSAR | ACTUAR | CELEBRAR | vacío",
  "competencia": "",
  "indicadores": ["indicador 1"],
  "peso": "",
  "instrumento": "",
  "color": "#1B3A6B",
  "actividades": [
    { "tipo": "I", "titulo": "Inicio (~10 min)", "pasos": ["paso 1"] },
    { "tipo": "D", "titulo": "Desarrollo (~25 min)", "pasos": ["paso 1"] },
    { "tipo": "C", "titulo": "Cierre (~15 min)", "pasos": ["paso 1"] }

  "texto_biblico": { "cita": "", "texto": "", "contexto": "" },

async function saveClase(){
  const btn=document.getElementById('btn-save');
  const msg=document.getElementById('save-msg');

  const f=E.form;

  // Validación: no guardar vacío
  if(!f.titulo||!f.titulo.trim()){
    showToast('⚠️ El título está vacío — carga el JSON primero','error');
    return;
  }

  if(btn)btn.disabled=true;
  if(msg)msg.textContent='⏳ Guardando...';

  // Serializar todo como JSON string explícito para garantizar
  // que Supabase recibe JSONB válido sin ambigüedad
  const payload=JSON.stringify({
    titulo:          f.titulo||'',
    subtitulo:       f.subtitulo||'',
    fase:            f.fase||'',
    competencia:     f.competencia||'',
    indicadores:     Array.isArray(f.indicadores)?f.indicadores:[],
    peso:            f.peso||'',
    instrumento:     f.instrumento||'',
    color:           f.color||'#1B3A6B',
    actividades:     Array.isArray(f.actividades)?f.actividades:[],
    texto_biblico:   (typeof f.texto_biblico==='object'&&f.texto_biblico)?f.texto_biblico:{cita:'',texto:'',contexto:''},
    actividades_cuaderno: Array.isArray(f.actividades_cuaderno)?f.actividades_cuaderno:[],
    metacognicion:   f.metacognicion||'',
    recursos:        Array.isArray(f.recursos)?f.recursos:[],
    nota_sustituto:  f.nota_sustituto||'',
    classroom_txt:   f.classroom_txt||'',
    imagenes:        Array.isArray(f.imagenes)?f.imagenes:[],
    rubrica:         f.rubrica||null,
  });

  console.log('Guardando clase — titulo:', f.titulo, '| semana:', E.semana);

  const {data,error}=await sb.rpc('upsert_clase',{
    p_profesor_id: S.prof.id,
    p_pin_hash:    S.pinHash,
    p_materia_id:  A.materiaId,
    p_grado:       A.grado,
    p_periodo:     A.periodo,
    p_semana:      E.semana,
    p_data:        payload,
  });

  if(btn)btn.disabled=false;

  if(error||!data?.ok){
    showToast('Error al guardar: '+(data?.error||error?.message||'desconocido'),'error');
    if(msg)msg.textContent='';
    console.error('Error save:', error, data);
    return;
  }

  E.claseId=data.clase_id;
  if(msg)msg.textContent='✓ Guardado';
  showToast('✓ Guardado: "'+f.titulo.slice(0,40)+'"','success');
  setTimeout(()=>{if(msg)msg.textContent='';},3000);
  reloadClases();
}

async function crearDocente(){
  const nombre=document.getElementById('n-nombre')?.value?.trim();
  const pin=document.getElementById('n-pin')?.value?.trim();
  const mats=document.getElementById('n-mats')?.value?.trim().split('\n').map(s=>s.trim()).filter(Boolean);
  const st=document.getElementById('n-status');
  if(!nombre){if(st)st.textContent='⚠️ El nombre es obligatorio';return;}
  if(!pin||pin.length!==6||!/^\d+$/.test(pin)){if(st)st.textContent='⚠️ PIN de 6 dígitos numéricos';return;}
  if(!mats?.length){if(st)st.textContent='⚠️ Agrega al menos una materia';return;}
  if(st)st.textContent='⏳ Creando...';

  const hash=await sha256(pin);
  const svgStr=getIconoSVG(_newIcono);const {data}=await sb.rpc('admin_crear_profesor',{p_admin_hash:S.pinHash,p_nombre:nombre,p_pin_hash:hash,p_color_1:_newColor,p_color_2:'#0D2B52',p_icono:_newIcono});
  if(!data?.ok){if(st)st.textContent='Error: '+(data?.error||'desconocido');return;}

  let matOk=0;
  for(const m of mats){
    const {data:md}=await sb.rpc('admin_crear_materia',{p_admin_hash:S.pinHash,p_profesor_id:data.id,p_nombre:m,p_color:_newColor,p_icono:_newIcono});
    if(md?.ok)matOk++;
  }

  showToast(`Docente "${nombre}" creado con ${matOk} materia${matOk!==1?'s':''}✓`,'success');
  setTimeout(()=>showAdmin(),1200);
}

function getRubricaData(){
  const rows=document.querySelectorAll('.rubrica-criteria-row[data-ri]');
  if(!rows.length)return null;
  const criterios=[];
  rows.forEach(row=>{
    const nombre=row.querySelector('[data-field="nombre"]')?.value?.trim()||'';
    const excelente=row.querySelector('[data-field="excelente"]')?.value||'';
    const logrado=row.querySelector('[data-field="logrado"]')?.value||'';
    const proceso=row.querySelector('[data-field="proceso"]')?.value||'';
    const inicio=row.querySelector('[data-field="inicio"]')?.value||'';
    if(nombre)criterios.push({nombre,niveles:{excelente,logrado,proceso,inicio}});
  });
  return criterios.length?{criterios}:null;
}

function renderRubricaBlock(){
  const r=E.form.rubrica;
  const criterios=(r&&Array.isArray(r.criterios))?r.criterios:[];
  const NHEAD=[
    {k:'excelente',l:'Excelente (4)',cls:'rb-ex',c:'#1B5E20'},
    {k:'logrado',  l:'Logrado (3)',  cls:'rb-lo',c:'#0D47A1'},
    {k:'proceso',  l:'En Proceso (2)',cls:'rb-pr',c:'#E65100'},
    {k:'inicio',   l:'Inicio (1)',   cls:'rb-in',c:'#B71C1C'},
  ];
  let h='<div class="rubrica-wrap">';
  if(criterios.length){
    h+=`<div class="rubrica-head"><span>Criterio</span>`;
    NHEAD.forEach(n=>h+=`<span style="color:${n.c === '#1B5E20' ? '#A5D6A7' : n.c === '#0D47A1' ? '#90CAF9' : n.c === '#E65100' ? '#FFCC80' : '#EF9A9A'}">${n.l}</span>`);
    h+=`<span></span></div>`;
    criterios.forEach((c,ci)=>{
      h+=`<div class="rubrica-criteria-row" data-ri="${ci}">
        <div><input class="rb-ta" data-field="nombre" value="${esc(c.nombre||'')}" placeholder="Criterio..." oninput="syncRubrica()" style="font-weight:700;color:var(--azul);min-height:36px"></div>`;
      NHEAD.forEach(n=>{
        h+=`<div><textarea class="rb-ta ${n.cls}" data-field="${n.k}" rows="2" placeholder="${n.l}..." oninput="syncRubrica()">${esc(c.niveles?.[n.k]||'')}</textarea></div>`;
      });
      h+=`<div style="display:flex;align-items:flex-start;padding-top:6px"><button class="btn-remove" onclick="rmCriterio(${ci})">✕</button></div></div>`;
    });
  } else {
    h+='<div class="rubrica-empty">Sin criterios — agrega el primero</div>';
  }
  h+='</div>';
  h+=`<button class="btn-rubrica-add" onclick="addCriterio()">+ Agregar criterio de evaluación</button>`;
  if(criterios.length){
    h+=`<button class="btn-rubrica-clear" onclick="clearRubrica()">✕ Eliminar rúbrica completa</button>`;
  }
  return h;
}

function syncRubrica(){
  E.form.rubrica=getRubricaData();
}
function addCriterio(){
  if(!E.form.rubrica||!Array.isArray(E.form.rubrica.criterios))
    E.form.rubrica={criterios:[]};
  E.form.rubrica.criterios.push({nombre:'',niveles:{excelente:'',logrado:'',proceso:'',inicio:''}});
  reRender();
}
function rmCriterio(ci){
  if(!E.form.rubrica?.criterios)return;
  // Sync current values before removing
  syncRubrica();
  E.form.rubrica.criterios.splice(ci,1);
  if(!E.form.rubrica.criterios.length)E.form.rubrica=null;
  reRender();
}
function clearRubrica(){ E.form.rubrica=null; reRender(); }

  if(imgs.length<IMG_MAX){
    h+=`<label class="img-upload-btn" title="Agregar imagen (JPG/PNG/WebP · máx 800KB)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Añadir</span>
      <input type="file" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="uploadImagen(this)">
    </label>`;
  }
  h+='</div>';
  h+=`<div class="img-hint">${imgs.length}/${IMG_MAX} imágenes · JPG, PNG, WebP · máx ${IMG_MAXKB}KB cada una · ideal para ejercicios, planos, diagramas</div>`;
  if(document.getElementById('img-upload-status'))
    h+=`<div id="img-upload-status" style="font-size:12px;color:var(--azul);margin-top:4px"></div>`;
  else
    h+=`<div id="img-upload-status" style="font-size:12px;color:var(--azul);margin-top:4px"></div>`;
  return h;
}

async function uploadImagen(input){
  const file=input.files[0]; if(!file)return;
  const st=document.getElementById('img-upload-status');
  const ok_types=['image/jpeg','image/png','image/webp'];
  if(!ok_types.includes(file.type)){ if(st)st.textContent='⚠️ Solo JPG, PNG o WebP'; return; }
  const kb=file.size/1024;
  if(kb>IMG_MAXKB){ if(st)st.textContent=`⚠️ La imagen pesa ${Math.round(kb)}KB — máximo ${IMG_MAXKB}KB`; return; }
  if(!Array.isArray(E.form.imagenes))E.form.imagenes=[];
  if(E.form.imagenes.length>=IMG_MAX){ if(st)st.textContent=`⚠️ Máximo ${IMG_MAX} imágenes por clase`; return; }
  if(st)st.textContent='⏳ Subiendo...';

  const ext=file.name.split('.').pop().toLowerCase();
  const path=`clase-${E.claseId||'tmp'}-${Date.now()}.${ext}`;
  const {data,error}=await sb.storage.from('clase-imagenes').upload(path,file,{upsert:true,contentType:file.type});
  if(error){ if(st)st.textContent='⚠️ Error al subir: '+error.message; return; }

  const {data:{publicUrl}}=sb.storage.from('clase-imagenes').getPublicUrl(path);
  E.form.imagenes.push(publicUrl);
  if(st)st.textContent='✓ Imagen agregada';
  // Re-render just the image block
  const imgSection=document.getElementById('img-section');
  if(imgSection)imgSection.innerHTML=renderImageBlock();
  setTimeout(()=>{ if(st)st.textContent=''; },2500);
  input.value='';
}

async function delImagen(idx){
  if(!Array.isArray(E.form.imagenes))return;
  const url=E.form.imagenes[idx];
  // Extract path from URL for deletion
  try{
    const parts=url.split('/clase-imagenes/');
    if(parts[1]) await sb.storage.from('clase-imagenes').remove([parts[1]]);
  }catch(e){ console.warn('Storage delete failed:', e); }
  E.form.imagenes.splice(idx,1);
  const imgSection=document.getElementById('img-section');
  if(imgSection)imgSection.innerHTML=renderImageBlock();
}

// ── UTILS ────────────────────────────────────────────────────────
function parseJ(v,fb){if(!v)return fb;if(typeof v==='object'&&!Array.isArray(v)&&Array.isArray(fb))return fb;if(typeof v==='object')return v;try{return JSON.parse(v);}catch{return fb;}}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='',3500);}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&E.form)backToGrid();});
</script>
